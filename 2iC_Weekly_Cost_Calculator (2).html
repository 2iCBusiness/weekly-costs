<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2iC — Weekly Cost & Profit Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #19304F;
    --teal:    #04998d;
    --teal-lt: #e4f5f3;
    --blue:    #2E4B7C;
    --blue-lt: #edf1f8;
    --white:   #ffffff;
    --bg:      #f7f8fa;
    --surface: #ffffff;
    --border:  #e2e6ec;
    --border2: #cdd3dc;
    --text:    #1a2332;
    --muted:   #6b7a90;
    --faint:   #f0f2f5;
    --green:   #1a6e3c;
    --green-bg:#eaf6ef;
    --red:     #b91c1c;
    --red-bg:  #fef2f2;
    --input-blue: #1a4fa0;
    --radius:  8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .shell { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  .masthead {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--navy);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark span {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -.5px;
  }
  .masthead h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--navy);
  }
  .masthead p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* ── Top nav ── */
  .nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    width: fit-content;
  }
  .nav-btn {
    padding: 7px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--faint); }
  .nav-btn.on { background: var(--navy); color: #fff; }

  /* ── Pages ── */
  .page { display: none; }
  .page.on { display: block; }

  /* ── Week tabs ── */
  .week-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .wtab {
    padding: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all .15s;
  }
  .wtab:hover { border-color: var(--border2); color: var(--text); }
  .wtab.on { background: var(--blue); color: #fff; border-color: var(--blue); }

  .week-panel { display: none; }
  .week-panel.on { display: block; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-body { overflow-x: auto; }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--faint);
  }
  .card-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .date-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 5px 10px;
    background: var(--white);
    width: 160px;
    outline: none;
  }
  .date-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(46,75,124,.1); }

  /* ── Data table ── */
  .dtable { width: 100%; border-collapse: collapse; min-width: 680px; }
  .dtable thead th {
    padding: 9px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-align: right;
    background: var(--faint);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .dtable thead th.lh { text-align: left; }
  .dtable tbody tr { border-bottom: 1px solid var(--border); }
  .dtable tbody tr:last-child { border-bottom: none; }
  .dtable tbody tr:hover { background: var(--faint); }
  .dtable td {
    padding: 7px 12px;
    font-size: 12px;
    text-align: right;
    vertical-align: middle;
  }
  .dtable td.name {
    text-align: left;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }
  .dtable td.recip {
    text-align: left;
    font-size: 11px;
    color: var(--muted);
  }
  .dtable td input[type=number] {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--input-blue);
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 4px 6px;
    background: transparent;
    width: 90px;
    text-align: right;
    outline: none;
    transition: border-color .1s, background .1s;
  }
  .dtable td input[type=number]:hover { border-color: var(--border2); background: var(--white); }
  .dtable td input[type=number]:focus { border-color: var(--blue); background: var(--blue-lt); }
  .dtable td.calc {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    background: var(--faint);
  }
  .dtable td.profit {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: var(--faint);
  }
  .dtable td.pos { color: var(--green); background: var(--green-bg); }
  .dtable td.neg { color: var(--red); background: var(--red-bg); }
  .dtable tfoot tr { background: var(--navy); }
  .dtable tfoot td {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    padding: 10px 12px;
  }
  .dtable tfoot td.name { color: #fff; font-family: 'DM Sans', sans-serif; letter-spacing: .02em; }

  /* ── KPI strip ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .kpi-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  .kpi-val {
    font-size: 22px;
    font-weight: 500;
    color: var(--navy);
    font-family: 'DM Mono', monospace;
  }
  .kpi-val.pos { color: var(--green); }
  .kpi-val.neg { color: var(--red); }

  /* ── Summary table ── */
  .sum-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .sum-scroll { overflow-x: auto; }
  .sum-head {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--faint);
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .stbl { width: 100%; border-collapse: collapse; min-width: 620px; }
  .stbl thead th {
    padding: 9px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-align: right;
    border-bottom: 1px solid var(--border);
    background: var(--faint);
    white-space: nowrap;
  }
  .stbl thead th:first-child { text-align: left; }
  .stbl tbody tr { border-bottom: 1px solid var(--border); }
  .stbl tbody tr:last-child { border-bottom: none; }
  .stbl tbody tr:hover { background: var(--faint); }
  .stbl td {
    padding: 9px 14px;
    font-size: 12px;
    text-align: right;
    font-family: 'DM Mono', monospace;
  }
  .stbl td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; color: var(--text); }
  .stbl tr.tot td { background: var(--navy); color: #fff; font-weight: 500; }
  .stbl tr.tot td:first-child { color: #fff; }

  /* ── Cum brand grid ── */
  .cum-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 8px;
  }
  .cum-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .cum-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .cum-val { font-size: 13px; font-weight: 500; color: var(--navy); font-family: 'DM Mono', monospace; }

  /* ── Accent bar on teal totals ── */
  .teal-tot { background: var(--teal) !important; }
  .teal-tot td { color: #fff !important; }

  /* hide number input arrows */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="shell">

  <div class="masthead">
    <div class="logo-mark"><span>2iC</span></div>
    <div>
      <h1>Weekly cost &amp; profit calculator</h1>
      <p>Enter data in blue fields — everything else calculates automatically</p>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn on" onclick="showPage('weekly',this)">Weekly input</button>
    <button class="nav-btn" onclick="showPage('summary',this)">Monthly summary</button>
  </div>

  <div id="page-weekly" class="page on">
    <div class="week-tabs" id="wtabs"></div>
    <div id="week-panels"></div>
  </div>

  <div id="page-summary" class="page">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="sum-wrap">
      <div class="sum-head">Week by week</div>
      <div class="sum-scroll"><table class="stbl">
        <thead><tr>
          <th>Week</th>
          <th>Ad spend</th>
          <th>Leads</th>
          <th>Total cost</th>
          <th>Avg CPL</th>
          <th>Revenue</th>
          <th>Net profit</th>
          <th>Margin</th>
        </tr></thead>
        <tbody id="sum-body"></tbody>
      </table></div>
    </div>
    <div class="sum-wrap">
      <div class="sum-head">Cumulative brand totals</div>
      <div style="padding:16px"><div class="cum-grid" id="cum-grid"></div></div>
    </div>
  </div>

</div>

<script>
const SOURCES = [
  ["UK Business Funds",                "HFG"],
  ["Kiwi Business Funds",              "NXT Wave CAV"],
  ["Aussie Business Funds - AF",       "Nero - Aus"],
  ["Australian Funding",               "Nero - CAV"],
  ["Smart Buy Finance (Residential)",  "Apace"],
  ["Capital Tree (Commercial)",        "Ambition"],
  ["Capital Tree (Residential)",       "EZI PL"],
  ["Capital Tree (Google)",            "EZI - CAV"],
  ["Capital Tree (Facebook)",          "BlueFunding"],
  ["Scribble Finance (Commercial)",    ""]
];
const BRANDS = SOURCES.map(s => s[1]);
const CUM = ["Leads (Net)","Nero","Hamilton Finance","BlueFunding","Ambition","EZIPL","Apace","ScribbleNZ","ScribbleAUS","NXT Wave"];

const D = {
  labels: ["W/E Week 1","W/E Week 2","W/E Week 3","W/E Week 4"],
  weeks: Array.from({length:4}, () => SOURCES.map(() => ({ad:0,leads:0,gen:0,rev:0,prospa:0,ref:0,biz:0})))
};

const $ = id => document.getElementById(id);
const fmt = n => isNaN(n)||!isFinite(n) ? '—' : '$' + parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const fmtn = n => isNaN(n)||!isFinite(n) ? '—' : Math.round(n).toLocaleString();
const fmtp = n => isNaN(n)||!isFinite(n) ? '—' : (n*100).toFixed(1)+'%';

function calc(r) {
  const tc = (r.ad||0) + (r.gen||0);
  const cpl = (r.leads||0) > 0 ? tc / r.leads : null;
  const np = (r.rev||0) - tc;
  const bt = (r.prospa||0) + (r.ref||0) + (r.biz||0);
  return {tc, cpl, np, bt};
}

function weekTotals(wi) {
  let ad=0,leads=0,gen=0,tc=0,rev=0,np=0,bt=0;
  D.weeks[wi].forEach(r => { const x=calc(r); ad+=r.ad||0; leads+=r.leads||0; gen+=r.gen||0; tc+=x.tc; rev+=r.rev||0; np+=x.np; bt+=x.bt; });
  return {ad,leads,gen,tc,cpl:leads>0?tc/leads:null,rev,np,margin:rev>0?np/rev:null,bt};
}

function renderWeek(wi) {
  const panel = $('wp'+wi);
  if (!panel) return;

  let html = `
  <div class="card">
    <div class="card-head">
      <span class="card-title">Lead costs &amp; revenue</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--muted)">Week ending</span>
        <input class="date-input" type="text" value="${D.labels[wi]}" data-wi="${wi}"
          oninput="D.labels[this.dataset.wi]=this.value;renderSummary()">
      </div>
    </div>
    <div class="card-body"><table class="dtable">
      <thead><tr>
        <th class="lh" style="width:200px">Lead source</th>
        <th>Ad spend ($)</th>
        <th>Leads (#)</th>
        <th>Gen. cost ($)</th>
        <th>Total cost</th>
        <th>CPL</th>
        <th class="lh">Recipient</th>
        <th>Gross rev ($)</th>
        <th>Net profit</th>
      </tr></thead>
      <tbody>`;

  D.weeks[wi].forEach((r, si) => {
    const x = calc(r);
    const npCls = x.np < 0 ? 'profit neg' : 'profit pos';
    const npTxt = x.np < 0 ? ('-$'+Math.abs(x.np).toFixed(2)) : fmt(x.np);
    html += `<tr>
      <td class="name">${SOURCES[si][0]}</td>
      <td><input type="number" min="0" step="0.01" value="${r.ad||0}"
        oninput="D.weeks[${wi}][${si}].ad=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td><input type="number" min="0" step="1" value="${r.leads||0}"
        oninput="D.weeks[${wi}][${si}].leads=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td><input type="number" min="0" step="0.01" value="${r.gen||0}"
        oninput="D.weeks[${wi}][${si}].gen=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td class="calc">${fmt(x.tc)}</td>
      <td class="calc">${x.cpl!=null?fmt(x.cpl):'—'}</td>
      <td class="recip">${SOURCES[si][1]}</td>
      <td><input type="number" min="0" step="0.01" value="${r.rev||0}"
        oninput="D.weeks[${wi}][${si}].rev=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td class="${npCls}">${npTxt}</td>
    </tr>`;
  });

  const wt = weekTotals(wi);
  const wNpTxt = wt.np < 0 ? ('-$'+Math.abs(wt.np).toFixed(2)) : fmt(wt.np);
  html += `</tbody>
    <tfoot><tr>
      <td class="name">Weekly totals</td>
      <td>${fmt(wt.ad)}</td>
      <td>${fmtn(wt.leads)}</td>
      <td>${fmt(wt.gen)}</td>
      <td>${fmt(wt.tc)}</td>
      <td>${wt.cpl!=null?fmt(wt.cpl):'—'}</td>
      <td></td>
      <td>${fmt(wt.rev)}</td>
      <td>${wNpTxt}</td>
    </tr></tfoot>
    </table></div>
  </div>

  <div class="card">
    <div class="card-head"><span class="card-title">Brand fees</span></div>
    <div class="card-body"><table class="dtable">
      <thead><tr>
        <th class="lh" style="width:200px">Brand</th>
        <th>Prospa ($)</th>
        <th>Referral ($)</th>
        <th>Bizcap ($)</th>
        <th>Total fees</th>
      </tr></thead>
      <tbody>`;

  let btot = 0;
  D.weeks[wi].forEach((r, si) => {
    if (!BRANDS[si]) return;
    const x = calc(r);
    btot += x.bt;
    html += `<tr>
      <td class="name">${BRANDS[si]}</td>
      <td><input type="number" min="0" step="0.01" value="${r.prospa||0}"
        oninput="D.weeks[${wi}][${si}].prospa=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td><input type="number" min="0" step="0.01" value="${r.ref||0}"
        oninput="D.weeks[${wi}][${si}].ref=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td><input type="number" min="0" step="0.01" value="${r.biz||0}"
        oninput="D.weeks[${wi}][${si}].biz=+this.value;renderWeek(${wi});renderSummary()"></td>
      <td class="calc">${fmt(x.bt)}</td>
    </tr>`;
  });

  html += `</tbody>
    <tfoot><tr>
      <td class="name">Total fees</td>
      <td></td><td></td><td></td>
      <td>${fmt(btot)}</td>
    </tr></tfoot>
    </table></div>
  </div>`;

  panel.innerHTML = html;
}

function renderSummary() {
  const sb = $('sum-body');
  if (!sb) return;
  sb.innerHTML = '';
  let totAd=0, totLeads=0, totRev=0, totNp=0;

  for (let wi = 0; wi < 4; wi++) {
    const wt = weekTotals(wi);
    totAd+=wt.ad; totLeads+=wt.leads; totRev+=wt.rev; totNp+=wt.np;
    const npTxt = wt.np < 0 ? ('-$'+Math.abs(wt.np).toFixed(2)) : fmt(wt.np);
    const npSty = wt.np < 0 ? 'color:#b91c1c' : 'color:#1a6e3c';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${D.labels[wi]}</td>
      <td>${fmt(wt.ad)}</td><td>${fmtn(wt.leads)}</td>
      <td>${fmt(wt.tc)}</td><td>${wt.cpl!=null?fmt(wt.cpl):'—'}</td>
      <td>${fmt(wt.rev)}</td>
      <td style="${npSty};font-weight:500">${npTxt}</td>
      <td>${wt.margin!=null?fmtp(wt.margin):'—'}</td>`;
    sb.appendChild(tr);
  }

  const totNpTxt = totNp < 0 ? ('-$'+Math.abs(totNp).toFixed(2)) : fmt(totNp);
  const tr = document.createElement('tr'); tr.className = 'tot';
  tr.innerHTML = `<td>Monthly total</td>
    <td>${fmt(totAd)}</td><td>${fmtn(totLeads)}</td>
    <td>—</td><td>—</td><td>${fmt(totRev)}</td>
    <td>${totNpTxt}</td>
    <td>${totRev>0?fmtp(totNp/totRev):'—'}</td>`;
  sb.appendChild(tr);

  const npCls = totNp < 0 ? 'neg' : 'pos';
  $('kpi-row').innerHTML = `
    <div class="kpi"><div class="kpi-label">Monthly ad spend</div><div class="kpi-val">${fmt(totAd)}</div></div>
    <div class="kpi"><div class="kpi-label">Total leads</div><div class="kpi-val">${fmtn(totLeads)}</div></div>
    <div class="kpi"><div class="kpi-label">Gross revenue</div><div class="kpi-val">${fmt(totRev)}</div></div>
    <div class="kpi"><div class="kpi-label">Net profit</div><div class="kpi-val ${npCls}">${totNp<0?('-$'+Math.abs(totNp).toFixed(2)):fmt(totNp)}</div></div>`;

  const cg = $('cum-grid'); cg.innerHTML = '';
  CUM.forEach((brand, si) => {
    let cum = 0;
    for (let wi = 0; wi < 4; wi++) cum += calc(D.weeks[wi][si]).bt;
    const div = document.createElement('div'); div.className = 'cum-card';
    div.innerHTML = `<span class="cum-name">${brand}</span><span class="cum-val">${fmt(cum)}</span>`;
    cg.appendChild(div);
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  $('page-'+name).classList.add('on');
  btn.classList.add('on');
  if (name === 'summary') renderSummary();
}

function showWeek(wi, btn) {
  document.querySelectorAll('.wtab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  $('wp'+wi).classList.add('on');
}

const wtabs = $('wtabs');
const wpanels = $('week-panels');
for (let i = 0; i < 4; i++) {
  const b = document.createElement('button');
  b.className = 'wtab' + (i===0?' on':'');
  b.textContent = 'Week ' + (i+1);
  b.onclick = (function(idx){ return function(){ showWeek(idx, this); }; })(i);
  wtabs.appendChild(b);
  const p = document.createElement('div');
  p.className = 'week-panel' + (i===0?' on':'');
  p.id = 'wp'+i;
  wpanels.appendChild(p);
  renderWeek(i);
}
renderSummary();
</script>
</body>
</html>
