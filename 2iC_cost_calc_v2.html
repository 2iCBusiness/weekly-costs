
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:14px}
.nav{display:flex;gap:6px;margin-bottom:1.5rem}
.nav-btn{padding:7px 16px;font-size:13px;font-weight:500;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s}
.nav-btn.on{background:#19304F;color:#fff;border-color:#19304F}
.page{display:none}.page.on{display:block}
.week-tabs{display:flex;gap:6px;margin-bottom:1rem}
.wtab{padding:6px 14px;font-size:12px;font-weight:500;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary)}
.wtab.on{background:#2E4B7C;color:#fff;border-color:#2E4B7C}
.week-panel{display:none}.week-panel.on{display:block}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.date-row label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.date-row input[type=text]{font-size:13px;font-weight:500;color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;background:var(--color-background-primary);width:160px}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.04em;text-transform:uppercase;margin:1.25rem 0 0.5rem;padding-bottom:4px;border-bottom:0.5px solid var(--color-border-tertiary)}
.source-row{display:grid;grid-template-columns:minmax(0,1.6fr) repeat(4,minmax(0,1fr)) minmax(0,.8fr) minmax(0,1fr);gap:0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:4px;overflow:hidden}
.source-row.hdr{background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
.cell{padding:8px 10px;font-size:12px;border-right:0.5px solid var(--color-border-tertiary)}
.cell:last-child{border-right:none}
.cell.hdr{font-size:11px;font-weight:500;color:var(--color-text-secondary)}
.cell.name{font-weight:500;color:var(--color-text-primary);display:flex;align-items:center}
.cell input[type=number]{width:100%;border:none;background:transparent;font-size:12px;color:#1a5fb4;font-weight:500;outline:none;text-align:right;padding:0}
.cell input[type=number]:focus{background:#E6F1FB;border-radius:3px;padding:0 3px}
.cell.calc{color:var(--color-text-primary);text-align:right;display:flex;align-items:center;justify-content:flex-end}
.cell.profit{text-align:right;display:flex;align-items:center;justify-content:flex-end;font-weight:500}
.cell.pos{color:#2d6a0f}
.cell.neg{color:#b91c1c}
.totals-row{display:grid;grid-template-columns:minmax(0,1.6fr) repeat(4,minmax(0,1fr)) minmax(0,.8fr) minmax(0,1fr);gap:0;background:#04998d;border-radius:var(--border-radius-md);margin-top:6px;overflow:hidden}
.totals-row .cell{color:#fff;font-weight:500;font-size:12px;border-right:0.5px solid rgba(255,255,255,.2);padding:9px 10px}
.totals-row .cell.name{color:#fff}
.brand-grid{display:grid;grid-template-columns:minmax(0,1.8fr) repeat(3,minmax(0,1fr)) minmax(0,1fr);gap:0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:4px;overflow:hidden}
.brand-grid.hdr{background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
.brand-totals{display:grid;grid-template-columns:minmax(0,1.8fr) repeat(3,minmax(0,1fr)) minmax(0,1fr);gap:0;background:#04998d;border-radius:var(--border-radius-md);margin-top:6px;overflow:hidden}
.brand-totals .cell{color:#fff;font-weight:500;font-size:12px;border-right:0.5px solid rgba(255,255,255,.2);padding:9px 10px}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.kpi-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:5px}
.kpi-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.kpi-val.neg{color:#b91c1c}
.kpi-val.pos{color:#2d6a0f}
.sum-tbl{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:12px}
.sum-tbl th{padding:8px 12px;text-align:right;font-weight:500;font-size:11px;color:#fff;background:#19304F;border-right:0.5px solid rgba(255,255,255,.2)}
.sum-tbl th:first-child{text-align:left;border-radius:var(--border-radius-md) 0 0 0}
.sum-tbl th:last-child{border-radius:0 var(--border-radius-md) 0 0;border-right:none}
.sum-tbl td{padding:8px 12px;text-align:right;border-bottom:0.5px solid var(--color-border-tertiary)}
.sum-tbl td:first-child{text-align:left;font-weight:500;color:var(--color-text-primary)}
.sum-tbl tr:nth-child(even) td{background:var(--color-background-secondary)}
.sum-tbl tr.tot td{background:#04998d;color:#fff;font-weight:500}
.cum-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
.cum-card{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary)}
.cum-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.cum-val{font-size:13px;font-weight:500;color:#19304F}
</style>

<h2 class="sr-only">2iC weekly cost and profit calculator</h2>

<div class="nav">
  <button class="nav-btn on" onclick="showPage('weekly',this)">Weekly input</button>
  <button class="nav-btn" onclick="showPage('summary',this)">Monthly summary</button>
</div>

<div id="page-weekly" class="page on">
  <div class="week-tabs" id="wtabs"></div>
  <div id="week-panels"></div>
</div>

<div id="page-summary" class="page">
  <div class="kpi-row" id="kpi-row"></div>
  <div class="section-label">Week by week</div>
  <table class="sum-tbl">
    <thead><tr>
      <th>Week</th><th>Ad spend</th><th>Leads</th><th>Total cost</th>
      <th>Avg CPL</th><th>Revenue</th><th>Net profit</th><th>Margin</th>
    </tr></thead>
    <tbody id="sum-body"></tbody>
  </table>
  <div class="section-label">Cumulative brand totals</div>
  <div class="cum-grid" id="cum-grid"></div>
</div>

<script>
const SOURCES=[
  ["UK Business Funds","HFG"],
  ["Kiwi Business Funds","NXT Wave CAV"],
  ["Aussie Business Funds - AF","Nero - Aus"],
  ["Australian Funding","Nero - CAV"],
  ["Smart Buy Finance (Residential)","Apace"],
  ["Capital Tree (Commercial)","Ambition"],
  ["Capital Tree (Residential)","EZI PL"],
  ["Capital Tree (Google)","EZI - CAV"],
  ["Capital Tree (Facebook)","BlueFunding"],
  ["Scribble Finance (Commercial)",""]
];
const BRANDS=["HFG","NXT Wave CAV","Nero - Aus","Nero - CAV","Apace","Ambition","EZI PL","EZI - CAV","BlueFunding",""];
const CUM=["Leads (Net)","Nero","Hamilton Finance","BlueFunding","Ambition","EZIPL","Apace","ScribbleNZ","ScribbleAUS","NXT Wave"];

const D={
  labels:["W/E Week 1","W/E Week 2","W/E Week 3","W/E Week 4"],
  weeks:Array.from({length:4},()=>SOURCES.map(()=>({ad:0,leads:0,gen:0,rev:0,prospa:0,ref:0,biz:0})))
};

const c=n=>isNaN(n)||!isFinite(n)?'—':'$'+parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const cn=n=>isNaN(n)||!isFinite(n)?'—':Math.round(n).toLocaleString();
const cp=n=>isNaN(n)||!isFinite(n)?'—':(n*100).toFixed(1)+'%';

function calc(r){
  const tc=(r.ad||0)+(r.gen||0);
  const cpl=(r.leads||0)>0?tc/r.leads:null;
  const np=(r.rev||0)-tc;
  const bt=(r.prospa||0)+(r.ref||0)+(r.biz||0);
  return{tc,cpl,np,bt};
}

function weekTotals(wi){
  let ad=0,leads=0,gen=0,tc=0,rev=0,np=0,bt=0;
  D.weeks[wi].forEach(r=>{const x=calc(r);ad+=r.ad||0;leads+=r.leads||0;gen+=r.gen||0;tc+=x.tc;rev+=r.rev||0;np+=x.np;bt+=x.bt});
  return{ad,leads,gen,tc,cpl:leads>0?tc/leads:null,rev,np,margin:rev>0?np/rev:null,bt};
}

function cumBrand(wi,si){
  let t=0;for(let w=0;w<=wi;w++){t+=calc(D.weeks[w][si]).bt;}return t;
}

function renderWeek(wi){
  const panel=document.getElementById('wp'+wi);
  if(!panel)return;
  const rows=D.weeks[wi];
  const wt=weekTotals(wi);

  let h=`
  <div class="date-row">
    <label>Week ending</label>
    <input type="text" value="${D.labels[wi]}" oninput="D.labels[this.dataset.wi]=this.value;renderSummary()" data-wi="${wi}">
  </div>
  <div class="section-label">Lead costs &amp; revenue</div>
  <div class="source-row hdr">
    <div class="cell hdr name">Lead source</div>
    <div class="cell hdr" style="text-align:right">Ad spend ($)</div>
    <div class="cell hdr" style="text-align:right">Leads (#)</div>
    <div class="cell hdr" style="text-align:right">Gen. cost ($)</div>
    <div class="cell hdr" style="text-align:right">Total cost</div>
    <div class="cell hdr" style="text-align:right">CPL</div>
    <div class="cell hdr" style="text-align:right">Net profit</div>
  </div>`;

  rows.forEach((r,si)=>{
    const x=calc(r);
    const profCls=x.np<0?'cell profit neg':'cell profit pos';
    const npTxt=x.np<0?('-$'+Math.abs(x.np).toFixed(2)):c(x.np);
    h+=`<div class="source-row">
      <div class="cell name">${SOURCES[si][0]}</div>
      <div class="cell"><input type="number" min="0" step="0.01" value="${r.ad||0}" oninput="D.weeks[${wi}][${si}].ad=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell"><input type="number" min="0" step="1" value="${r.leads||0}" oninput="D.weeks[${wi}][${si}].leads=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell"><input type="number" min="0" step="0.01" value="${r.gen||0}" oninput="D.weeks[${wi}][${si}].gen=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell calc">${c(x.tc)}</div>
      <div class="cell calc">${x.cpl!=null?c(x.cpl):'—'}</div>
      <div class="${profCls}">${npTxt}</div>
    </div>`;
  });

  const wNpTxt=wt.np<0?('-$'+Math.abs(wt.np).toFixed(2)):c(wt.np);
  h+=`<div class="totals-row">
    <div class="cell name">Weekly totals</div>
    <div class="cell" style="text-align:right">${c(wt.ad)}</div>
    <div class="cell" style="text-align:right">${cn(wt.leads)}</div>
    <div class="cell" style="text-align:right">${c(wt.gen)}</div>
    <div class="cell" style="text-align:right">${c(wt.tc)}</div>
    <div class="cell" style="text-align:right">${wt.cpl!=null?c(wt.cpl):'—'}</div>
    <div class="cell" style="text-align:right">${wNpTxt}</div>
  </div>
  <div class="section-label">Brand fees</div>
  <div class="brand-grid hdr">
    <div class="cell hdr name">Brand</div>
    <div class="cell hdr" style="text-align:right">Prospa ($)</div>
    <div class="cell hdr" style="text-align:right">Referral ($)</div>
    <div class="cell hdr" style="text-align:right">Bizcap ($)</div>
    <div class="cell hdr" style="text-align:right">Total fees</div>
  </div>`;

  rows.forEach((r,si)=>{
    if(!BRANDS[si])return;
    const x=calc(r);
    const cum=cumBrand(wi,si);
    h+=`<div class="brand-grid">
      <div class="cell name">${BRANDS[si]}</div>
      <div class="cell"><input type="number" min="0" step="0.01" value="${r.prospa||0}" oninput="D.weeks[${wi}][${si}].prospa=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell"><input type="number" min="0" step="0.01" value="${r.ref||0}" oninput="D.weeks[${wi}][${si}].ref=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell"><input type="number" min="0" step="0.01" value="${r.biz||0}" oninput="D.weeks[${wi}][${si}].biz=+this.value;renderWeek(${wi});renderSummary()"></div>
      <div class="cell calc">${c(x.bt)}</div>
    </div>`;
  });

  let btot=0;rows.forEach(r=>{const x=calc(r);btot+=x.bt;});
  h+=`<div class="brand-totals">
    <div class="cell name">Total fees</div>
    <div class="cell" style="text-align:right"></div>
    <div class="cell" style="text-align:right"></div>
    <div class="cell" style="text-align:right"></div>
    <div class="cell" style="text-align:right">${c(btot)}</div>
  </div>`;

  panel.innerHTML=h;
}

function renderSummary(){
  let totAd=0,totLeads=0,totRev=0,totNp=0;
  const sb=document.getElementById('sum-body');
  if(!sb)return;
  sb.innerHTML='';
  for(let wi=0;wi<4;wi++){
    const wt=weekTotals(wi);
    totAd+=wt.ad;totLeads+=wt.leads;totRev+=wt.rev;totNp+=wt.np;
    const npTxt=wt.np<0?('-$'+Math.abs(wt.np).toFixed(2)):c(wt.np);
    const npSty=wt.np<0?'color:#b91c1c':'color:#2d6a0f';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${D.labels[wi]}</td><td>${c(wt.ad)}</td><td>${cn(wt.leads)}</td><td>${c(wt.tc)}</td><td>${wt.cpl!=null?c(wt.cpl):'—'}</td><td>${c(wt.rev)}</td><td style="${npSty};font-weight:500">${npTxt}</td><td>${wt.margin!=null?cp(wt.margin):'—'}</td>`;
    sb.appendChild(tr);
  }
  const totNpTxt=totNp<0?('-$'+Math.abs(totNp).toFixed(2)):c(totNp);
  const tr=document.createElement('tr');tr.className='tot';
  tr.innerHTML=`<td>Monthly total</td><td>${c(totAd)}</td><td>${cn(totLeads)}</td><td>—</td><td>—</td><td>${c(totRev)}</td><td>${totNpTxt}</td><td>${totRev>0?cp(totNp/totRev):'—'}</td>`;
  sb.appendChild(tr);

  const npCls=totNp<0?'neg':'pos';
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="kpi-label">Monthly ad spend</div><div class="kpi-val">${c(totAd)}</div></div>
    <div class="kpi"><div class="kpi-label">Total leads</div><div class="kpi-val">${cn(totLeads)}</div></div>
    <div class="kpi"><div class="kpi-label">Gross revenue</div><div class="kpi-val">${c(totRev)}</div></div>
    <div class="kpi"><div class="kpi-label">Net profit</div><div class="kpi-val ${npCls}">${totNp<0?('-$'+Math.abs(totNp).toFixed(2)):c(totNp)}</div></div>`;

  const cg=document.getElementById('cum-grid');cg.innerHTML='';
  CUM.forEach((brand,si)=>{
    let cum=0;for(let wi=0;wi<4;wi++){cum+=calc(D.weeks[wi][si]).bt;}
    const div=document.createElement('div');div.className='cum-card';
    div.innerHTML=`<span class="cum-name">${brand}</span><span class="cum-val">${c(cum)}</span>`;
    cg.appendChild(div);
  });
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='summary')renderSummary();
}

function showWeek(wi,btn){
  document.querySelectorAll('.wtab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.week-panel').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('wp'+wi).classList.add('on');
}

const wt=document.getElementById('wtabs');
const wp=document.getElementById('week-panels');
for(let i=0;i<4;i++){
  const b=document.createElement('button');
  b.className='wtab'+(i===0?' on':'');
  b.textContent='Week '+(i+1);
  b.onclick=(e=>wi=>showWeek(wi,e.target))(b);
  b.setAttribute('data-wi',i);
  b.onclick=function(){showWeek(i,this)};
  wt.appendChild(b);
  const p=document.createElement('div');
  p.className='week-panel'+(i===0?' on':'');
  p.id='wp'+i;
  wp.appendChild(p);
  renderWeek(i);
}
renderSummary();
</script>
